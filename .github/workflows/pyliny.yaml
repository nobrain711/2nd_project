name: Pylint

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"

  pull_request:
    branches:
      - main
      - develop

jobs:
  pylint:
    name: pylint (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ml_cpu
            python-version: "3.12"
            requirements: docker/ml/cpu/requirements.txt
            lint-paths: "notebooks"
            lint-tool: "nbqa"
          - target: pipeline
            python-version: "3.12"
            requirements: docker/pipeline/requirements.txt
            lint-paths: "pipeline"
            lint-tool: "pylint"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ${{ matrix.requirements }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ matrix.requirements }}
          pip install pylint nbqa

      - name: Run Pylint
        shell: bash
        run: |
          if [ "${{ matrix.lint-tool }}" = "nbqa" ]; then
            nbqa pylint ${{ matrix.lint-paths }} \
              --disable=C0114,C0103,W0611,W0612
          else
            pylint ${{ matrix.lint-paths }} \
              --disable=C0103,W0611,W0612,R0903
          fi
# - 2026-03-07: MySQL Service에 초기 데이터베이스, 유저, table 생성 작업 (@nobrain711)
# - 2026-03-08: MySQL Service에 정상적으로 서버 동작 확인 작업 추가 (@nobrain711)
# - 2026-03-08: Pipeline Service가 동작시 DB에 데이터 적재 생성 및 Jyputer lab 실행문 제거 (@nobrain711)
# - 2026-03-08: compose 파일 수정 (python_base 이미지 빌드 및 각 서비스 build 경로 정리, mlflow와 streamlit 추가) 및 프로젝트 명 반영 (@nobrain711)
# - 2026-03-08: compose 파일 수정 (.vscode local mount, notebooks syspath 이동) 및 작업자명을 github 이름으로 변경 (@nobrain711)
